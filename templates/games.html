<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luna Gifts — Игры</title>
    <link rel="icon" href="/static/img/logo.png" type="image/png">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonconnect/ui@2.4.1/dist/tonconnect-ui.min.js" async></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: var(--bg);
            overflow-x: hidden;
        }

        .games-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 14px 16px 120px;
            min-height: 100vh;
        }

        /* Game cards */
        .games-menu {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }

        .game-card {
            position: relative;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            width: 100%;
            min-height: 160px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .game-card:active {
            transform: scale(0.97);
        }

        .game-card-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 20px 24px;
            min-height: inherit;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .game-card-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .game-card-text {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            line-height: 1.1;
        }

        .game-card-badges {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .game-card-badge {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
        }

        .game-card-badge img {
            width: 14px;
            height: 14px;
        }

        .game-card-gif {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
            position: absolute;
            right: 16px;
            bottom: 10px;
        }

        /* Card themes */
        .game-card-cases {
            background: radial-gradient(136.32% 93.18% at 70.03% 11.93%, #001aaf, #000548 45.34%, #000548);
        }

        .game-card-scratch {
            background: radial-gradient(136.32% 93.18% at 70.03% 11.93%, #4c00af, #1d0048 45.34%, #160035);
        }

        .game-card-mini {
            background: radial-gradient(136.32% 93.18% at 70.03% 11.93%, #af0000, #480000 45.34%, #350000);
        }

        /* Banner at top */
        .games-banner {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 14px;
            min-height: 140px;
            background: linear-gradient(135deg, #4338ca 0%, #6d28d9 50%, #7e22ce 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2);
        }

        .games-banner-text {
            position: relative;
            z-index: 2;
        }

        .games-banner-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 6px;
        }

        .games-banner-title {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            line-height: 1.2;
        }

        .games-banner-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 6px 20px rgba(0,0,0,0.4));
            position: relative;
            z-index: 2;
        }

        .games-banner-price {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            padding: 4px 10px;
            margin-top: 8px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
        }

        .games-banner-price img {
            width: 14px;
            height: 14px;
        }

        @media (max-width: 360px) {
            .game-card { min-height: 140px; }
            .game-card-text { font-size: 22px; }
            .game-card-gif { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <img class="loading-screen-gif" src="/static/img/loading.gif" alt="">
        <div class="loading-text">Luna Gifts</div>
        <div class="load-progress-wrap">
            <div class="load-progress-bar" id="loadProgressBar"></div>
        </div>
        <div class="load-status" id="loadStatus">Загрузка...</div>
        <div class="load-percent" id="loadPercent">0%</div>
    </div>

    <div class="games-container">
        <!-- Banners Carousel -->
        <div class="banners-carousel" id="bannersCarousel" style="display:none;">
            <div class="banners-track" id="bannersTrack"></div>
            <div class="banners-dots" id="bannersDots"></div>
        </div>

        <!-- Banner -->
        <div class="games-banner" id="gamesBanner" style="display:none;" onclick="window.location.href='/cases'">
            <div class="games-banner-text">
                <div class="games-banner-label">НОВЫЙ КЕЙС</div>
                <div class="games-banner-title" id="gamesBannerTitle"></div>
                <div class="games-banner-price" id="gamesBannerPrice"></div>
            </div>
            <img class="games-banner-img" id="gamesBannerImg" src="" alt="">
        </div>

        <div class="games-menu">
            <div class="game-card game-card-cases display-box" onclick="window.location.href='/cases'">
                <div class="grill-animation">
                    <div class="grill-bars">
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                    </div>
                    <div class="grid-overlay">
                        <div class="grid-track"></div>
                    </div>
                </div>
                <div class="game-card-content">
                    <div class="game-card-info">
                        <span class="game-card-text">Кейсы</span>
                        <div class="game-card-badges">
                            <div class="game-card-badge"><img src="/static/img/ton.png" alt=""></div>
                            <div class="game-card-badge"><img src="/static/img/star.png" alt=""></div>
                        </div>
                    </div>
                    <img src="/static/gifs/cases.gif" alt="Cases" class="game-card-gif" loading="lazy">
                </div>
            </div>

            <div class="game-card game-card-scratch display-box" onclick="window.location.href='/scratch'">
                <div class="grill-animation">
                    <div class="grill-bars">
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                    </div>
                    <div class="grid-overlay">
                        <div class="grid-track"></div>
                    </div>
                </div>
                <div class="game-card-content">
                    <div class="game-card-info">
                        <span class="game-card-text">Moon Scratch</span>
                        <div class="game-card-badges">
                            <div class="game-card-badge"><img src="/static/img/star.png" alt=""></div>
                        </div>
                    </div>
                    <img src="/static/gifs/moon.gif" alt="Moon Scratch" class="game-card-gif" loading="lazy">
                </div>
            </div>

            <div class="game-card game-card-mini display-box game-card-disabled" style="filter:grayscale(1);opacity:0.45;pointer-events:none;position:relative;">
                <div class="grill-animation">
                    <div class="grill-bars">
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                        <div class="grill-bar"></div><div class="grill-bar"></div><div class="grill-bar"></div>
                    </div>
                    <div class="grid-overlay">
                        <div class="grid-track"></div>
                    </div>
                </div>
                <div class="game-card-content">
                    <div class="game-card-info">
                        <span class="game-card-text">Краш</span>
                        <div class="game-card-badges">
                            <div class="game-card-badge"><img src="/static/img/ton.png" alt=""></div>
                            <div class="game-card-badge"><img src="/static/img/star.png" alt=""></div>
                        </div>
                    </div>
                    <img src="/static/gifs/boom.gif" alt="Crash" class="game-card-gif" loading="lazy">
                </div>
                <div style="position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.7);letter-spacing:0.5px;z-index:5;">СКОРО</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-inner">
            <a href="/market" class="nav-item"><span class="nav-icon"><img src="/static/img/gift.png" alt=""></span><span class="nav-label">Маркет</span></a>
            <a href="/" class="nav-item"><span class="nav-icon"><img src="/static/img/quest.png" alt=""></span><span class="nav-label">Задания</span></a>
            <a href="/games" class="nav-item active"><span class="nav-icon"><img src="/static/img/games.png" alt=""></span><span class="nav-label">Игры</span></a>
            <a href="/referral" class="nav-item"><span class="nav-icon"><img src="/static/img/ref.png" alt=""></span><span class="nav-label">Рефералы</span></a>
            <a href="/inventory" class="nav-item"><span class="nav-icon"><img src="/static/img/profil.png" alt=""></span><span class="nav-label">Профиль</span></a>
        </div>
    </nav>

    <script src="/static/js/app.js"></script>
    <script>
    // Generate SVG grid pattern for grill animation
    (function() {
        const gridSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="480" height="167" viewBox="0 0 480 167" fill="none">
            <g stroke="rgba(255,255,255,0.4)" stroke-width="0.5">
                ${Array.from({length: 12}, (_, i) => `<line x1="${i * 40}" y1="0" x2="${i * 40}" y2="167"/>`).join('')}
                ${Array.from({length: 8}, (_, i) => `<line x1="0" y1="${i * 24}" x2="480" y2="${i * 24}"/>`).join('')}
            </g>
        </svg>`;
        document.querySelectorAll('.grid-track').forEach(function(track) {
            track.innerHTML = gridSvg + gridSvg + gridSvg;
        });
    })();

    // Ripple effect
    document.querySelectorAll('.game-card').forEach(card => {
        card.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.cssText = `position:absolute;border-radius:50%;background:rgba(255,255,255,0.25);transform:scale(0);animation:ripple 0.8s ease-out;width:${size}px;height:${size}px;top:${e.clientY-rect.top-size/2}px;left:${e.clientX-rect.left-size/2}px;z-index:1;pointer-events:none;`;
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 800);
        });
    });

    document.addEventListener('DOMContentLoaded', async function() {
        setLoadProgress(5, 'Инициализация...');
        await initApp();
        setLoadProgress(65, 'TON Connect...');
        initTonConnect();
        loadBanners();
        dismissLoading();
    });

    // ── Banners Carousel ──
    let _bannerIdx=0;let _bannerCount=0;let _bannerTimer=null;
    async function loadBanners(){
        try{
            const res=await fetch('/api/banners');
            const banners=await res.json();
            if(!banners.length)return;
            _bannerCount=banners.length;
            const carousel=document.getElementById('bannersCarousel');
            const track=document.getElementById('bannersTrack');
            const dots=document.getElementById('bannersDots');
            track.innerHTML=banners.map(function(url){return '<div class="banner-slide"><img src="'+url+'" alt="" onerror="this.parentElement.style.display=\'none\'"></div>';}).join('');
            if(_bannerCount>1){
                dots.innerHTML=banners.map(function(_,i){return '<span class="banners-dot'+(i===0?' active':'')+'" onclick="goToBanner('+i+')"></span>';}).join('');
            }
            carousel.style.display='block';
            if(_bannerCount>1){
                _bannerTimer=setInterval(function(){nextBanner();},5000);
            }
        }catch(e){}
    }
    function goToBanner(idx){
        _bannerIdx=idx;
        document.getElementById('bannersTrack').style.transform='translateX(-'+(_bannerIdx*100)+'%)';
        document.querySelectorAll('.banners-dot').forEach(function(d,i){d.classList.toggle('active',i===_bannerIdx);});
        if(_bannerTimer){clearInterval(_bannerTimer);_bannerTimer=setInterval(function(){nextBanner();},5000);}
    }
    function nextBanner(){
        _bannerIdx=(_bannerIdx+1)%_bannerCount;
        goToBanner(_bannerIdx);
    }
    </script>
</body>
</html>
