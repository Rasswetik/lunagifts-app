<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luna Gifts — PVP</title>
    <link rel="icon" href="/static/img/logo.png" type="image/png">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonconnect/ui@2.4.1/dist/tonconnect-ui.min.js" async></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
    :root{--pvp-accent:#6C5CE7;--pvp-green:#00D2A0;--pvp-bg:#0a0e1a;--glass:rgba(255,255,255,.04);--glass-border:rgba(255,255,255,.08);--glass-strong:rgba(255,255,255,.07);}
    body{background:var(--pvp-bg);overflow-x:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;}
    .pvp-container{max-width:480px;margin:0 auto;padding:12px 16px 140px;min-height:100vh;}

    /* ── Glassmorphism card ── */
    .glass-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:20px;}

    /* ── Top bar ── */
    .pvp-top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 2px;}
    .pvp-icon-btn{width:42px;height:42px;border-radius:14px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.5);transition:all .2s;}
    .pvp-icon-btn:active{transform:scale(.9);background:rgba(255,255,255,.1);}
    .pvp-icon-btn svg{width:18px;height:18px;}
    .pvp-total-pill{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:16px;padding:10px 20px;display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;letter-spacing:.3px;}
    .pvp-total-pill img{width:18px;height:18px;}
    .pvp-total-label{color:rgba(255,255,255,.4);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-right:4px;}

    /* ── Wheel wrapper ── */
    .pvp-wheel-section{position:relative;margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;}
    .pvp-wheel-wrap{position:relative;width:290px;height:290px;margin:0 auto 0;}
    @media(min-width:400px){.pvp-wheel-wrap{width:330px;height:330px;}}

    .pvp-wheel-ring{position:absolute;inset:-8px;border-radius:50%;border:3px solid rgba(255,255,255,.06);pointer-events:none;z-index:1;}
    .pvp-wheel-ring.countdown-active{border-color:var(--pvp-green);box-shadow:0 0 20px rgba(0,210,160,.15);transition:border-color .3s,box-shadow .3s;}

    .pvp-wheel-outer{position:absolute;inset:0;border-radius:50%;overflow:hidden;background:#0d1220;box-shadow:inset 0 0 60px rgba(0,0,0,.5),0 0 40px rgba(0,0,0,.3);}
    #pvpWheelCanvas{width:100%;height:100%;border-radius:50%;}

    /* Pointer */
    .pvp-pointer{position:absolute;top:-4px;left:50%;transform:translateX(-50%);z-index:12;width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:20px solid #fff;filter:drop-shadow(0 2px 8px rgba(0,0,0,.6));transition:filter .3s;}
    .pvp-pointer.active{filter:drop-shadow(0 2px 12px rgba(0,210,160,.5));border-top-color:var(--pvp-green);}

    /* Center overlay */
    .pvp-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:86px;height:86px;border-radius:50%;background:var(--pvp-bg);border:3px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:5;box-shadow:0 0 30px rgba(0,0,0,.4);}
    .pvp-center-text{font-size:13px;font-weight:800;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px;}
    .pvp-center-text.live{color:var(--pvp-green);text-shadow:0 0 16px rgba(0,210,160,.4);animation:pvpLivePulse 2s ease-in-out infinite;}
    @keyframes pvpLivePulse{0%,100%{opacity:1;text-shadow:0 0 16px rgba(0,210,160,.4);}50%{opacity:.7;text-shadow:0 0 24px rgba(0,210,160,.6);}}
    .pvp-center-timer{font-size:26px;font-weight:900;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:1px;}
    .pvp-center-timer-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}

    /* ── Currency toggles ── */
    .pvp-currency-row{display:flex;gap:8px;justify-content:center;margin:16px 0 10px;}
    .pvp-cur-btn{width:38px;height:38px;border-radius:12px;background:var(--glass);border:1.5px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;padding:0;}
    .pvp-cur-btn img,.pvp-cur-btn svg{width:20px;height:20px;}
    .pvp-cur-btn.active{border-color:var(--pvp-green);background:rgba(0,210,160,.08);box-shadow:0 0 12px rgba(0,210,160,.15);}

    /* ── Balance ── */
    .pvp-balance-badge{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px;}
    .pvp-balance-badge img{width:16px;height:16px;}
    .pvp-balance-badge span{font-size:15px;font-weight:800;color:rgba(255,255,255,.7);}

    /* ── Bet buttons ── */
    .pvp-bet-row{display:flex;gap:10px;justify-content:center;margin-bottom:10px;}
    .pvp-bet-btn{flex:1;max-width:110px;padding:13px 6px;border-radius:16px;background:linear-gradient(135deg,var(--pvp-accent),#8B5CF6);border:none;color:#fff;font-weight:800;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;box-shadow:0 4px 20px rgba(108,92,231,.3);letter-spacing:.3px;}
    .pvp-bet-btn:active{transform:scale(.94);}
    .pvp-bet-btn:disabled{opacity:.3;cursor:default;transform:none;box-shadow:none;}
    .pvp-bet-btn img{width:15px;height:15px;filter:brightness(10);}

    /* Custom bet */
    .pvp-custom-btn{width:100%;max-width:350px;margin:0 auto 18px;display:block;padding:13px;border-radius:16px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);color:rgba(255,255,255,.5);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px;}
    .pvp-custom-btn:active{transform:scale(.97);background:rgba(255,255,255,.08);}

    /* ── Info text ── */
    .pvp-info-text{text-align:center;font-size:13px;color:rgba(255,255,255,.3);margin-bottom:8px;font-weight:600;}

    /* ── Players ── */
    .pvp-players-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px;}
    .pvp-players-header h3{font-size:16px;font-weight:800;margin:0;letter-spacing:.3px;}
    .pvp-roll-id{font-size:11px;color:rgba(255,255,255,.25);font-weight:700;letter-spacing:.5px;}

    .pvp-player-card{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:18px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;transition:all .3s;}
    .pvp-player-card .left-border{position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:0 4px 4px 0;}
    .pvp-player-avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.1);flex-shrink:0;}
    .pvp-player-info{flex:1;min-width:0;}
    .pvp-player-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .pvp-player-role{font-size:11px;color:rgba(255,255,255,.3);font-weight:600;margin-top:2px;}
    .pvp-player-right{text-align:right;flex-shrink:0;}
    .pvp-player-chance{font-size:16px;font-weight:900;letter-spacing:.3px;}
    .pvp-player-amount{font-size:12px;color:rgba(255,255,255,.35);display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:2px;}
    .pvp-player-amount img{width:12px;height:12px;}

    /* ── Hash ── */
    .pvp-hash{text-align:center;margin-top:16px;font-size:11px;color:rgba(255,255,255,.2);font-weight:600;letter-spacing:.5px;}

    /* ── Result modal (glassmorphism) ── */
    .pvp-result-overlay{position:fixed;inset:0;z-index:1100;display:none;align-items:flex-end;justify-content:center;padding:0 0 20px;background:rgba(0,0,0,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
    .pvp-result-overlay.active{display:flex;animation:fadeIn .3s ease;}
    .pvp-result-modal{background:rgba(20,24,40,.95);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.08);border-radius:28px 28px 0 0;width:100%;max-width:480px;padding:28px 22px 36px;max-height:80vh;overflow-y:auto;}
    .pvp-result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .pvp-result-title{font-size:20px;font-weight:900;letter-spacing:.3px;}
    .pvp-result-close{width:36px;height:36px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
    .pvp-result-close:active{transform:scale(.9);}
    .pvp-winner-card{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding:16px;background:rgba(0,210,160,.06);border:1px solid rgba(0,210,160,.12);border-radius:18px;}
    .pvp-winner-avatar{width:52px;height:52px;border-radius:50%;border:3px solid var(--pvp-green);object-fit:cover;}
    .pvp-winner-info{flex:1;}
    .pvp-winner-name{font-size:16px;font-weight:800;}
    .pvp-winner-label{font-size:11px;color:var(--pvp-green);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
    .pvp-winner-amount{text-align:right;}
    .pvp-winner-won{font-size:20px;font-weight:900;color:var(--pvp-green);}
    .pvp-winner-chance{font-size:12px;color:rgba(255,255,255,.35);margin-top:2px;}
    .pvp-result-done{width:100%;padding:15px;border-radius:16px;background:linear-gradient(135deg,var(--pvp-accent),#8B5CF6);border:none;color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;letter-spacing:.3px;transition:all .2s;}
    .pvp-result-done:active{transform:scale(.97);}

    /* ── History modal ── */
    .pvp-history-overlay{position:fixed;inset:0;z-index:1100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
    .pvp-history-overlay.active{display:flex;animation:fadeIn .3s ease;}
    .pvp-history-modal{background:rgba(20,24,40,.95);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.08);border-radius:24px;width:90%;max-width:400px;padding:22px;max-height:70vh;overflow-y:auto;}
    .pvp-hist-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04);}
    .pvp-hist-item:last-child{border-bottom:none;}
    .pvp-hist-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.06);}
    .pvp-hist-name{font-size:13px;font-weight:700;flex:1;}
    .pvp-hist-pot{font-size:14px;font-weight:800;color:var(--pvp-green);}

    /* ── Animations ── */
    @keyframes pvpWaitSpin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
    .pvp-waiting-anim{animation:pvpWaitSpin 20s linear infinite;}

    /* ── Bet expand animation ── */
    @keyframes betExpand{
        0%{transform:scale(1);box-shadow:0 4px 20px rgba(108,92,231,.3);}
        30%{transform:scale(1.15);box-shadow:0 0 40px rgba(108,92,231,.6),0 0 80px rgba(108,92,231,.3);}
        60%{transform:scale(1.05);}
        100%{transform:scale(1);box-shadow:0 4px 20px rgba(108,92,231,.3);}
    }
    .pvp-bet-btn.bet-pulse{animation:betExpand .5s ease-out;}

    /* ── Bet ripple effect ── */
    @keyframes betRipple{
        0%{transform:translate(-50%,-50%) scale(0);opacity:.8;}
        100%{transform:translate(-50%,-50%) scale(4);opacity:0;}
    }
    .bet-ripple{position:fixed;width:100px;height:100px;background:radial-gradient(circle,rgba(108,92,231,.5) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:9999;animation:betRipple .6s ease-out forwards;}

    /* ── Circular progress ring ── */
    .pvp-progress-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-90deg);width:94px;height:94px;z-index:4;pointer-events:none;}
    .pvp-progress-ring circle{fill:none;stroke-width:4;stroke-linecap:round;}
    .pvp-progress-ring .ring-bg{stroke:rgba(255,255,255,.06);}
    .pvp-progress-ring .ring-progress{stroke:var(--pvp-green);stroke-dasharray:282.6;stroke-dashoffset:282.6;transition:stroke-dashoffset .3s linear;filter:drop-shadow(0 0 8px rgba(0,210,160,.4));}
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <img class="loading-screen-gif" src="/static/img/loading.gif" alt="">
        <div class="loading-text">Luna Gifts</div>
        <div class="load-progress-wrap"><div class="load-progress-bar" id="loadProgressBar"></div></div>
        <div class="load-status" id="loadStatus">Загрузка...</div>
        <div class="load-percent" id="loadPercent">0%</div>
    </div>

    <div class="pvp-container">
        <!-- Top bar -->
        <div class="pvp-top-bar">
            <div class="pvp-icon-btn" onclick="showPvpHistory()">
                <svg fill="none" viewBox="0 0 24 24"><path d="M12 8v4l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/></svg>
            </div>
            <div class="pvp-total-pill">
                <span class="pvp-total-label">Total</span>
                <span id="pvpTotalAmount">0</span>
                <img src="/static/img/star.svg" alt="">
            </div>
            <div class="pvp-icon-btn">
                <svg fill="none" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
        </div>

        <!-- Wheel Section -->
        <div class="pvp-wheel-section">
            <div class="pvp-wheel-wrap" id="pvpWheelWrap">
                <div class="pvp-wheel-ring" id="pvpWheelRing"></div>
                <div class="pvp-pointer" id="pvpPointer"></div>
                <div class="pvp-wheel-outer" id="pvpWheelOuter">
                    <canvas id="pvpWheelCanvas" width="680" height="680"></canvas>
                </div>
                <div class="pvp-center" id="pvpCenter">
                    <svg class="pvp-progress-ring" id="pvpProgressRing" viewBox="0 0 94 94">
                        <circle class="ring-bg" cx="47" cy="47" r="45"></circle>
                        <circle class="ring-progress" id="pvpRingProgress" cx="47" cy="47" r="45"></circle>
                    </svg>
                    <div class="pvp-center-text" id="pvpCenterText">WAITING</div>
                    <div class="pvp-center-timer" id="pvpCenterTimer" style="display:none;">00:30</div>
                    <div class="pvp-center-timer-label" id="pvpCenterTimerLabel" style="display:none;">remaining</div>
                </div>
            </div>
        </div>

        <!-- Balance -->
        <div class="pvp-balance-badge">
            <img src="/static/img/star.svg" alt="">
            <span id="pvpBalanceDisplay">0</span>
        </div>

        <!-- Bet buttons -->
        <div class="pvp-bet-row">
            <button class="pvp-bet-btn" onclick="placePvpBet(50, this)">
                <img src="/static/img/star.svg" alt=""> 50
            </button>
            <button class="pvp-bet-btn" onclick="placePvpBet(100, this)">
                <img src="/static/img/star.svg" alt=""> 100
            </button>
            <button class="pvp-bet-btn" onclick="placePvpBet(200, this)">
                <img src="/static/img/star.svg" alt=""> 200
            </button>
        </div>

        <!-- Customize -->
        <button class="pvp-custom-btn" onclick="showCustomBet()">✦ Customize Bet</button>

        <!-- Info text -->
        <div class="pvp-info-text" id="pvpInfoText">Place your bet to enter the round</div>

        <!-- Players list -->
        <div class="pvp-players-header">
            <h3><span id="pvpPlayerCount">0</span> Player<span id="pvpPlayerPlural">s</span></h3>
            <span class="pvp-roll-id">ROLL #<span id="pvpRollId">0</span></span>
        </div>
        <div id="pvpPlayersList"></div>

        <!-- Hash -->
        <div class="pvp-hash" id="pvpHash">HASH <span id="pvpHashVal"></span></div>
    </div>

    <!-- Result Modal -->
    <div class="pvp-result-overlay" id="pvpResultOverlay">
        <div class="pvp-result-modal">
            <div class="pvp-result-header">
                <div class="pvp-result-title">Roll #<span id="pvpResultRoll"></span></div>
                <button class="pvp-result-close" onclick="closePvpResult()">✕</button>
            </div>
            <div class="pvp-winner-card">
                <img class="pvp-winner-avatar" id="pvpWinnerAvatar" src="" alt="">
                <div class="pvp-winner-info">
                    <div class="pvp-winner-name" id="pvpWinnerName"></div>
                    <div class="pvp-winner-label">Winner</div>
                </div>
                <div class="pvp-winner-amount">
                    <div class="pvp-winner-won" id="pvpWinnerWon"></div>
                    <div class="pvp-winner-chance" id="pvpWinnerChance"></div>
                </div>
            </div>
            <button class="pvp-result-done" onclick="closePvpResult()">Done</button>
        </div>
    </div>

    <!-- History Modal -->
    <div class="pvp-history-overlay" id="pvpHistoryOverlay" onclick="this.classList.remove('active')">
        <div class="pvp-history-modal" onclick="event.stopPropagation()">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
                <div style="font-size:18px;font-weight:900;letter-spacing:.3px;">PVP History</div>
                <button style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;width:32px;height:32px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;" onclick="document.getElementById('pvpHistoryOverlay').classList.remove('active')">✕</button>
            </div>
            <div id="pvpHistoryList"></div>
        </div>
    </div>

    <!-- Custom bet modal -->
    <div class="modal-overlay" id="customBetModal">
        <div class="modal" style="max-width:360px;padding:28px;text-align:center;background:rgba(20,24,40,.95);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.08);border-radius:24px;">
            <button class="modal-close" onclick="closeModal('customBetModal')">✕</button>
            <div style="font-size:18px;font-weight:900;margin-bottom:20px;letter-spacing:.3px;">Custom Bet</div>
            <input type="number" id="customBetInput" placeholder="Enter amount" min="10" style="width:100%;padding:15px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#fff;font-size:18px;font-weight:800;text-align:center;outline:none;margin-bottom:18px;-moz-appearance:textfield;transition:border-color .2s;" onfocus="this.style.borderColor='rgba(108,92,231,.4)'" onblur="this.style.borderColor='rgba(255,255,255,.08)'">
            <button onclick="placeCustomBet()" style="width:100%;padding:15px;border:none;border-radius:16px;background:linear-gradient(135deg,#6C5CE7,#8B5CF6);color:#fff;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.3px;transition:all .2s;">Place Bet</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-inner">
            <a href="/market" class="nav-item"><span class="nav-icon"><img src="/static/img/gift.png" alt=""></span><span class="nav-label">Маркет</span></a>
            <a href="/" class="nav-item"><span class="nav-icon"><img src="/static/img/quest.png" alt=""></span><span class="nav-label">Задания</span></a>
            <a href="/games" class="nav-item active"><span class="nav-icon"><img src="/static/img/games.png" alt=""></span><span class="nav-label">Игры</span></a>
            <a href="/referral" class="nav-item"><span class="nav-icon"><img src="/static/img/ref.png" alt=""></span><span class="nav-label">Рефералы</span></a>
            <a href="/inventory" class="nav-item"><span class="nav-icon"><img src="/static/img/profil.png" alt=""></span><span class="nav-label">Профиль</span></a>
        </div>
    </nav>

    <script src="/static/js/app.js"></script>
    <script>
    // ============ PVP WHEEL GAME ============
    const canvas = document.getElementById('pvpWheelCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const CX = W/2, CY = H/2, R = W/2 - 6;

    let pvpState = null;
    let pvpPolling = null;
    let isSpinning = false;
    let wheelRotation = 0;
    let resultShown = false;
    let avatarImages = {};
    let waitingRotation = 0;
    let waitingAnimFrame = null;

    const WAIT_COLORS = ['#1a1f2e','#1e2438','#1a1f2e','#1e2438','#1a1f2e','#1e2438','#1a1f2e','#1e2438','#1a1f2e','#1e2438','#1a1f2e','#1e2438'];

    // ── Draw Wheel ──
    function drawWheel(players, rotation){
        ctx.clearRect(0, 0, W, H);

        if(!players || players.length === 0){
            drawWaitingWheel();
            return;
        }

        const total = players.reduce((s,p) => s + p.amount, 0);
        if(total === 0){ drawWaitingWheel(); return; }

        let startAngle = -Math.PI/2 + (rotation||0) * Math.PI/180;

        players.forEach((p, i) => {
            const slice = (p.amount / total) * Math.PI * 2;

            // Gradient-like fill for each slice
            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.arc(CX, CY, R, startAngle, startAngle + slice);
            ctx.closePath();
            ctx.fillStyle = p.color || '#444';
            ctx.fill();

            // Inner shadow on slice
            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.arc(CX, CY, R, startAngle, startAngle + slice);
            ctx.closePath();
            const grad = ctx.createRadialGradient(CX, CY, R*0.3, CX, CY, R);
            grad.addColorStop(0, 'rgba(0,0,0,.15)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fill();

            // Divider line
            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.lineTo(CX + R * Math.cos(startAngle), CY + R * Math.sin(startAngle));
            ctx.strokeStyle = 'rgba(0,0,0,.35)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Avatar in slice center
            const midAngle = startAngle + slice/2;
            const avatarDist = R * 0.6;
            const ax = CX + avatarDist * Math.cos(midAngle);
            const ay = CY + avatarDist * Math.sin(midAngle);
            const avatarR = Math.min(32, Math.max(16, slice * R * 0.14));

            if(p.photo_url && avatarImages[p.telegram_id]){
                // Shadow behind avatar
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,.5)';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(ax, ay, avatarR, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(0,0,0,.3)';
                ctx.fill();
                ctx.restore();

                ctx.save();
                ctx.beginPath();
                ctx.arc(ax, ay, avatarR, 0, Math.PI*2);
                ctx.closePath();
                ctx.clip();
                try{
                    ctx.drawImage(avatarImages[p.telegram_id], ax-avatarR, ay-avatarR, avatarR*2, avatarR*2);
                }catch(e){}
                ctx.restore();
                // White border
                ctx.beginPath();
                ctx.arc(ax, ay, avatarR+1.5, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(255,255,255,.25)';
                ctx.lineWidth = 2.5;
                ctx.stroke();
            } else {
                // Letter avatar with glass effect
                ctx.beginPath();
                ctx.arc(ax, ay, avatarR, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(0,0,0,.35)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,.2)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${Math.round(avatarR*1.1)}px -apple-system,BlinkMacSystemFont,sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText((p.first_name||p.username||'?')[0].toUpperCase(), ax, ay);
            }

            startAngle += slice;
        });

        // Outer ring glow
        ctx.beginPath();
        ctx.arc(CX, CY, R+2, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,255,255,.06)';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Inner ring
        ctx.beginPath();
        ctx.arc(CX, CY, R*0.25, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,255,255,.04)';
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    function drawWaitingWheel(){
        const segments = 12;
        const sliceAngle = (Math.PI*2)/segments;
        let start = -Math.PI/2 + (waitingRotation * Math.PI/180);

        for(let i=0; i<segments; i++){
            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.arc(CX, CY, R, start, start + sliceAngle);
            ctx.closePath();
            ctx.fillStyle = i%2===0 ? '#161b2b' : '#1a2035';
            ctx.fill();

            // Subtle divider
            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.lineTo(CX + R * Math.cos(start), CY + R * Math.sin(start));
            ctx.strokeStyle = 'rgba(255,255,255,.03)';
            ctx.lineWidth = 1;
            ctx.stroke();

            start += sliceAngle;
        }

        // Outer ring
        ctx.beginPath();
        ctx.arc(CX, CY, R, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,255,255,.05)';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Inner subtle ring
        ctx.beginPath();
        ctx.arc(CX, CY, R*0.25, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,255,255,.03)';
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    // Slow waiting rotation
    function startWaitingAnim(){
        if(waitingAnimFrame) return;
        function tick(){
            waitingRotation = (waitingRotation + 0.08) % 360;
            if(!isSpinning && pvpState && (!pvpState.players || pvpState.players.length === 0)){
                drawWaitingWheel();
            }
            waitingAnimFrame = requestAnimationFrame(tick);
        }
        waitingAnimFrame = requestAnimationFrame(tick);
    }

    function stopWaitingAnim(){
        if(waitingAnimFrame){ cancelAnimationFrame(waitingAnimFrame); waitingAnimFrame = null; }
    }

    // ── Load avatar images ──
    function loadAvatarImages(players){
        players.forEach(p => {
            if(p.photo_url && !avatarImages[p.telegram_id]){
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => { avatarImages[p.telegram_id] = img; };
                img.src = p.photo_url;
            }
        });
    }

    // ── Spin animation ──
    function spinWheel(targetAngle, players){
        if(isSpinning) return;
        isSpinning = true;
        resultShown = false;
        stopWaitingAnim();

        const duration = 6000;
        const startTime = performance.now();
        const startRot = 0;
        const endRot = targetAngle;

        function animate(now){
            const elapsed = now - startTime;
            const progress = Math.min(1, elapsed / duration);
            // Quartic ease out for smoother deceleration
            const eased = 1 - Math.pow(1 - progress, 4);
            wheelRotation = startRot + eased * endRot;
            drawWheel(players, wheelRotation);

            if(progress < 1){
                requestAnimationFrame(animate);
            } else {
                isSpinning = false;
                wheelRotation = endRot;
            }
        }
        requestAnimationFrame(animate);
    }

    // ── Update UI from state ──
    let prevStatus = '';
    let prevGameId = 0;
    let prevPlayerCount = 0;
    let prevTotalPot = 0;
    let lastPlayerHash = '';

    function getPlayerHash(players){
        return players.map(p => p.telegram_id + ':' + p.amount).join('|');
    }

    function updatePvpUI(state){
        if(!state) return;
        pvpState = state;

        const players = state.players || [];
        const status = state.status;
        const total = state.total_pot || 0;
        const currentPlayerHash = getPlayerHash(players);
        const playersChanged = currentPlayerHash !== lastPlayerHash;
        const countdown = state.countdown || 0;

        // Total
        document.getElementById('pvpTotalAmount').textContent = total;

        // Roll ID
        document.getElementById('pvpRollId').textContent = state.game_id || 0;

        // Hash
        const h = state.hash || '';
        document.getElementById('pvpHashVal').textContent = h ? h.slice(0,4)+'···'+h.slice(-4) : '';

        // Player count
        document.getElementById('pvpPlayerCount').textContent = players.length;
        document.getElementById('pvpPlayerPlural').textContent = players.length === 1 ? '' : 's';

        // Ring + pointer state
        const ring = document.getElementById('pvpWheelRing');
        const pointer = document.getElementById('pvpPointer');
        const progressRing = document.getElementById('pvpRingProgress');
        const RING_CIRCUMFERENCE = 282.6;

        // Center text
        const centerText = document.getElementById('pvpCenterText');
        const centerTimer = document.getElementById('pvpCenterTimer');
        const centerTimerLabel = document.getElementById('pvpCenterTimerLabel');

        if(status === 'waiting' || (status === 'betting' && players.length < 2)){
            centerText.textContent = 'WAITING';
            centerText.className = 'pvp-center-text';
            centerText.style.display = '';
            centerTimer.style.display = 'none';
            centerTimerLabel.style.display = 'none';
            ring.classList.remove('countdown-active');
            pointer.classList.remove('active');
            progressRing.style.strokeDashoffset = RING_CIRCUMFERENCE;
            if(players.length === 0) startWaitingAnim();
            else stopWaitingAnim();
        } else if(status === 'betting' || status === 'countdown'){
            stopWaitingAnim();
            if(countdown > 0){
                centerText.style.display = 'none';
                centerTimer.style.display = '';
                centerTimerLabel.style.display = '';
                const secs = Math.ceil(countdown);
                centerTimer.textContent = String(Math.floor(secs/60)).padStart(2,'0')+':'+String(secs%60).padStart(2,'0');
                ring.classList.add('countdown-active');
                pointer.classList.add('active');
                // Update circular progress ring (30 second countdown)
                const maxCountdown = 30;
                const progress = Math.min(1, (maxCountdown - countdown) / maxCountdown);
                progressRing.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - progress);
            } else {
                centerText.textContent = 'LIVE';
                centerText.className = 'pvp-center-text live';
                centerText.style.display = '';
                centerTimer.style.display = 'none';
                centerTimerLabel.style.display = 'none';
                ring.classList.remove('countdown-active');
                pointer.classList.add('active');
                progressRing.style.strokeDashoffset = 0;
            }
        } else if(status === 'spinning'){
            stopWaitingAnim();
            centerText.textContent = 'LIVE';
            centerText.className = 'pvp-center-text live';
            centerText.style.display = '';
            centerTimer.style.display = 'none';
            centerTimerLabel.style.display = 'none';
            ring.classList.remove('countdown-active');
            pointer.classList.add('active');
        } else if(status === 'result'){
            stopWaitingAnim();
            centerText.style.display = 'none';
            centerTimer.style.display = 'none';
            centerTimerLabel.style.display = 'none';
            ring.classList.remove('countdown-active');
            pointer.classList.remove('active');
        }

        // Load avatars
        loadAvatarImages(players);

        // Draw wheel (only if not currently spinning and players actually changed)
        if(!isSpinning){
            if(status === 'spinning' && prevStatus !== 'spinning'){
                spinWheel(state.spin_angle, players);
            } else if(status !== 'spinning'){
                // Only redraw if players changed or game reset
                if(playersChanged || state.game_id !== prevGameId){
                    wheelRotation = 0;
                    if(players.length > 0){
                        drawWheel(players, 0);
                    } else {
                        drawWaitingWheel();
                    }
                }
            }
        }

        // Update tracking variables
        lastPlayerHash = currentPlayerHash;
        prevPlayerCount = players.length;
        prevTotalPot = total;

        // Result modal
        if(status === 'result' && !resultShown && state.winner){
            resultShown = true;
            showPvpResult(state);
        }

        // New game reset
        if(state.game_id !== prevGameId && prevGameId !== 0){
            resultShown = false;
            wheelRotation = 0;
            closePvpResult();
        }

        // Info text
        const info = document.getElementById('pvpInfoText');
        if(players.length === 0){
            info.textContent = 'Place your bet to enter the round';
        } else if(players.length === 1){
            info.textContent = 'Waiting for more players...';
        } else if(status === 'countdown'){
            info.textContent = 'Round in progress — place your bets!';
        } else if(status === 'spinning'){
            info.textContent = 'Spinning...';
        } else {
            info.textContent = '';
        }

        // Bet buttons state
        const canBet = ['waiting','betting','countdown'].includes(status);
        document.querySelectorAll('.pvp-bet-btn').forEach(b => b.disabled = !canBet);

        // Player list
        renderPvpPlayers(players);

        prevStatus = status;
        prevGameId = state.game_id;
    }

    function renderPvpPlayers(players){
        const c = document.getElementById('pvpPlayersList');
        if(!players.length){
            c.innerHTML = '';
            return;
        }
        const sorted = [...players].sort((a,b) => b.amount - a.amount);
        c.innerHTML = sorted.map(p => {
            const photoSrc = p.photo_url || '';
            const avatarHtml = photoSrc
                ? `<img class="pvp-player-avatar" src="${photoSrc}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="pvp-player-avatar" style="background:${p.color};display:none;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;flex-shrink:0;">${(p.first_name||p.username||'?')[0].toUpperCase()}</div>`
                : `<div class="pvp-player-avatar" style="background:${p.color};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;flex-shrink:0;">${(p.first_name||p.username||'?')[0].toUpperCase()}</div>`;
            return `<div class="pvp-player-card">
                <div class="left-border" style="background:${p.color}"></div>
                ${avatarHtml}
                <div class="pvp-player-info">
                    <div class="pvp-player-name">${p.username ? '@'+p.username : p.first_name || 'Player'}</div>
                    <div class="pvp-player-role">Player</div>
                </div>
                <div class="pvp-player-right">
                    <div class="pvp-player-chance">${(p.chance||0).toFixed(1)}%</div>
                    <div class="pvp-player-amount">${p.amount} <img src="/static/img/star.svg" alt=""></div>
                </div>
            </div>`;
        }).join('');
    }

    // ── Place bet ──
    async function placePvpBet(amount, btnElement){
        if(!currentUser){showNotification('Login required','error');return;}
        if(!amount || amount < 1) return;

        const btns = document.querySelectorAll('.pvp-bet-btn');
        btns.forEach(b => b.disabled = true);

        try{
            const res = await fetch('/api/pvp/bet', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({telegram_id: currentUser.telegram_id, amount: amount})
            });
            const data = await res.json();
            if(data.success){
                currentUser.balance = data.new_balance;
                updateUI();
                document.getElementById('pvpBalanceDisplay').textContent = Math.floor(data.new_balance);
                showNotification('Bet '+amount+' ⭐ placed!','success');
                
                // Bet expand animation
                if(btnElement){
                    btnElement.classList.add('bet-pulse');
                    setTimeout(() => btnElement.classList.remove('bet-pulse'), 500);
                }
                
                // Create ripple effect from center of wheel
                const wheelWrap = document.getElementById('pvpWheelWrap');
                const rect = wheelWrap.getBoundingClientRect();
                const ripple = document.createElement('div');
                ripple.className = 'bet-ripple';
                ripple.style.left = (rect.left + rect.width/2) + 'px';
                ripple.style.top = (rect.top + rect.height/2) + 'px';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
                
                fetchPvpState();
            } else {
                showNotification(data.error || 'Error','error');
            }
        }catch(e){
            showNotification('Connection error','error');
        }

        setTimeout(() => {
            btns.forEach(b => b.disabled = false);
        }, 1000);
    }

    function showCustomBet(){
        openModal('customBetModal');
        document.getElementById('customBetInput').focus();
    }

    function placeCustomBet(){
        const val = parseInt(document.getElementById('customBetInput').value);
        if(!val || val < 10){showNotification('Minimum 10 Stars','error');return;}
        closeModal('customBetModal');
        placePvpBet(val);
    }

    // ── Result modal ──
    function showPvpResult(state){
        const w = state.winner;
        if(!w) return;
        document.getElementById('pvpResultRoll').textContent = state.game_id;
        document.getElementById('pvpWinnerName').textContent = (w.username ? '@'+w.username : w.first_name || 'Player');
        document.getElementById('pvpWinnerWon').textContent = 'Won '+state.total_pot+' ⭐';
        document.getElementById('pvpWinnerChance').textContent = (w.chance||0).toFixed(2)+'% chance';
        const avatarEl = document.getElementById('pvpWinnerAvatar');
        if(w.photo_url) avatarEl.src = w.photo_url;
        else avatarEl.src = '/static/img/star.svg';
        document.getElementById('pvpResultOverlay').classList.add('active');

        if(currentUser && w.telegram_id === currentUser.telegram_id){
            setTimeout(async ()=>{
                try{
                    const r = await fetch('/api/balance/'+currentUser.telegram_id);
                    const d = await r.json();
                    currentUser.balance = d.balance;
                    updateUI();
                    document.getElementById('pvpBalanceDisplay').textContent = Math.floor(d.balance);
                }catch(e){}
            }, 1000);
        }
    }

    function closePvpResult(){
        document.getElementById('pvpResultOverlay').classList.remove('active');
    }

    // ── History ──
    async function showPvpHistory(){
        document.getElementById('pvpHistoryOverlay').classList.add('active');
        try{
            const res = await fetch('/api/pvp/history');
            const data = await res.json();
            const list = document.getElementById('pvpHistoryList');
            if(!data.history || !data.history.length){
                list.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.25);padding:24px;font-size:14px;font-weight:600;">No games yet</div>';
                return;
            }
            list.innerHTML = data.history.map(h => `
                <div class="pvp-hist-item">
                    <img class="pvp-hist-avatar" src="${h.winner_photo||'/static/img/star.svg'}" alt="" onerror="this.src='/static/img/star.svg'">
                    <div class="pvp-hist-name">${h.winner_name}</div>
                    <div class="pvp-hist-pot">${h.total_pot} ⭐</div>
                </div>
            `).join('');
        }catch(e){
            document.getElementById('pvpHistoryList').innerHTML='<div style="text-align:center;color:rgba(255,255,255,.25);padding:24px;">Loading error</div>';
        }
    }

    // ── Polling ──
    async function fetchPvpState(){
        try{
            const res = await fetch('/api/pvp/state');
            const data = await res.json();
            if(data.success) updatePvpUI(data);
        }catch(e){}
    }

    function startPvpPolling(){
        fetchPvpState();
        pvpPolling = setInterval(fetchPvpState, 800);
    }

    // ── Init ──
    document.addEventListener('DOMContentLoaded', async function(){
        setLoadProgress(5, 'Initializing...');
        await initApp();
        setLoadProgress(65, 'TON Connect...');
        initTonConnect();
        setLoadProgress(80, 'PVP...');

        if(currentUser){
            document.getElementById('pvpBalanceDisplay').textContent = Math.floor(currentUser.balance);
        }

        drawWaitingWheel();
        startWaitingAnim();
        startPvpPolling();
        dismissLoading();
    });
    </script>
</body>
